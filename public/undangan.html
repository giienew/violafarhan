<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Preparation — Viola & Farhan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            /* Tema Default: Dusty Rose (Lembut & Elegan) */
            --primary: #d8a4a5;
            --primary-light: #e6b9ba;
            --primary-dim: rgba(216, 164, 165, 0.15);
            --primary-border: rgba(216, 164, 165, 0.4);
            
            --rose: #e09f9c;
            --azure: #a1b5c8;
            
            /* Latar belakang gelap tapi lebih warm/abu-abu mewah, bukan hitam pekat */
            --bg-main: #111113;
            --bg-card: rgba(25, 25, 28, 0.6);
            --bg-hover: rgba(255, 255, 255, 0.03);
            
            --glass-border: rgba(255, 255, 255, 0.06);
            --shadow-elegant: 0 8px 32px rgba(0, 0, 0, 0.2);
            
            --text: #f9f6f0;
            --text-dim: rgba(249, 246, 240, 0.6);
            --text-muted: rgba(249, 246, 240, 0.3);
        }

        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg-main);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            margin: 0; padding-bottom: 100px;
            overflow-x: hidden; min-height: 100vh;
            transition: color 0.5s ease;
        }

        /* ═══════════════════════════════════════
           THEME SWITCHER WIDGET
        ═══════════════════════════════════════ */
        .theme-switcher-wrap {
            position: fixed; right: 20px; bottom: 90px; z-index: 1000;
            display: flex; flex-direction: column-reverse; align-items: center; gap: 10px;
        }
        .theme-palette {
            display: flex; flex-direction: column; gap: 10px;
            opacity: 0; transform: translateY(15px); pointer-events: none;
            transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: rgba(17, 17, 19, 0.8); padding: 10px; border-radius: 24px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        .theme-switcher-wrap:hover .theme-palette {
            opacity: 1; transform: translateY(0); pointer-events: auto;
        }
        .theme-toggle-btn {
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(17, 17, 19, 0.8); border: 1px solid var(--primary-border);
            color: var(--primary); font-size: 1rem;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .theme-toggle-btn:hover { background: var(--primary-dim); }
        
        .color-dot {
            width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: 0.3s;
        }
        .color-dot:hover { transform: scale(1.15); border-color: #fff; }

        /* ═══════════════════════════════════════
           SPLASH SCREEN
        ═══════════════════════════════════════ */
        #splashScreen {
            position: fixed; inset: 0; z-index: 10000;
            background: var(--bg-main);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: opacity 1.2s ease, transform 1.2s ease;
        }
        .splash-ornament {
            width: 160px; height: 160px; border: 1px solid var(--primary-border);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            position: relative; margin-bottom: 30px;
            transition: border-color 0.8s;
        }
        .splash-ornament::before {
            content: ''; position: absolute; inset: 8px;
            border: 1px solid rgba(255,255,255,0.05); border-radius: 50%;
        }
        .splash-monogram {
            font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-style: italic;
            color: var(--primary); line-height: 1; transition: color 0.8s;
        }
        .splash-names {
            font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 500;
            color: var(--text); letter-spacing: 2px; text-align: center; margin-bottom: 8px;
        }
        .splash-subtitle {
            font-size: 0.65rem; letter-spacing: 5px; color: var(--text-dim);
            text-transform: uppercase; margin-bottom: 40px;
        }
        .splash-cta {
            display: flex; align-items: center; gap: 10px;
            border: 1px solid var(--primary-border); background: var(--primary-dim);
            padding: 10px 24px; border-radius: 40px;
            font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text);
            animation: float 3s ease-in-out infinite; transition: 0.5s;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* ═══════════════════════════════════════
           PARTICLES
        ═══════════════════════════════════════ */
        #particles { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
        .particle {
            position: absolute; top: -30px; opacity: 0;
            animation: particleFall linear infinite;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
        @keyframes particleFall {
            0% { transform: translateY(-30px) rotate(0deg) translateX(0); opacity: 0; }
            15% { opacity: 0.6; }
            85% { opacity: 0.4; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(40px); opacity: 0; }
        }

        /* ═══════════════════════════════════════
           MUSIC BUTTON
        ═══════════════════════════════════════ */
        #musicBtn {
            position: fixed; bottom: 20px; right: 20px; z-index: 1000;
            width: 44px; height: 44px;
            background: rgba(17, 17, 19, 0.8); border: 1px solid var(--primary-border);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        #musicBtn:hover { background: var(--primary-dim); }
        #musicBtn.spinning i { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ═══════════════════════════════════════
           LAYOUT & HEADER
        ═══════════════════════════════════════ */
        .container {
            max-width: 540px; margin: 0 auto; padding: 20px 18px; position: relative; z-index: 10;
        }
        .royal-header { text-align: center; padding: 30px 0 25px; }
        .header-divider { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .header-divider::before, .header-divider::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, var(--primary-border), transparent);
        }
        .header-divider-icon { color: var(--primary); font-size: 0.5rem; opacity: 0.8; }
        
        .royal-title {
            font-family: 'Cormorant Garamond', serif; font-size: 2.6rem; font-style: italic; font-weight: 500;
            color: var(--primary); margin: 0 0 4px; line-height: 1; transition: color 0.8s;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .royal-subtitle {
            font-size: 0.65rem; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 15px;
        }

        .status-pill {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(52,199,89,0.08); border: 1px solid rgba(52,199,89,0.2);
            padding: 4px 12px; border-radius: 20px; font-size: 0.6rem; font-weight: 500;
            color: #8ce19e; letter-spacing: 1px; text-transform: uppercase;
        }
        .status-dot { width: 5px; height: 5px; background: #8ce19e; border-radius: 50%; animation: blink 2s infinite; }

        /* ═══════════════════════════════════════
           LUXURY GLASS CARDS (Stat Grid & Forms)
        ═══════════════════════════════════════ */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .luxury-card {
            background: var(--bg-card); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 18px; position: relative; overflow: hidden;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--shadow-elegant); margin-bottom: 24px;
        }
        .stat-card {
            display: flex; flex-direction: column;
            background: var(--bg-card); border: 1px solid var(--glass-border);
            border-radius: 18px; padding: 18px; position: relative; overflow: hidden;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: var(--shadow-elegant); transition: 0.3s;
        }
        .stat-card:hover { border-color: var(--primary-border); background: var(--bg-hover); }
        .stat-icon-bg {
            position: absolute; right: -5px; bottom: -5px; font-size: 3rem; opacity: 0.04; transform: rotate(-10deg);
        }
        .stat-label { font-size: 0.6rem; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 6px; }
        .stat-value { font-size: 1.8rem; font-weight: 600; font-family: 'Cormorant Garamond', serif; }
        
        .stat-card.primary { border-top: 2px solid var(--primary); }
        .stat-card.primary .stat-value { color: var(--primary); }
        .stat-card.rose { border-top: 2px solid var(--rose); }
        .stat-card.rose .stat-value { color: var(--rose); }
        .stat-card.azure { border-top: 2px solid var(--azure); }
        .stat-card.azure .stat-value { color: var(--azure); }

        /* Form Elements */
        .card-header { padding-bottom: 14px; border-bottom: 1px solid var(--glass-border); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .card-title { font-size: 0.65rem; letter-spacing: 2px; color: var(--primary); text-transform: uppercase; font-weight: 500; display: flex; align-items: center; gap: 8px; }

        .form-row { padding: 14px 0; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: space-between; }
        .form-row:last-of-type { border-bottom: none; }
        .form-label { font-size: 0.8rem; font-weight: 400; color: var(--text-dim); }

        .luxury-input, .luxury-select {
            background: transparent; border: none; outline: none; padding: 0;
            color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.9rem; width: 100%; text-align: right;
        }
        .luxury-input { text-align: left; }
        .luxury-input::placeholder { color: var(--text-muted); font-weight: 300; }
        .luxury-select { color: var(--primary); font-weight: 500; cursor: pointer; -webkit-appearance: none; direction: rtl; }
        .luxury-select option { background: var(--bg-main); color: var(--text); direction: ltr; }

        .vip-row {
            padding: 14px 16px; margin-top: 10px; border-radius: 12px;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--primary-dim); border: 1px solid var(--primary-border);
        }
        .vip-label { font-size: 0.8rem; font-weight: 500; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        /* Custom Toggle */
        .toggle-wrap { position: relative; width: 46px; height: 26px; }
        .toggle-wrap input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute; inset: 0; background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid var(--glass-border); cursor: pointer; transition: 0.3s;
        }
        .toggle-track::before {
            content: ''; position: absolute; height: 20px; width: 20px; left: 2px; top: 2px; background: var(--text-dim); border-radius: 50%; transition: 0.3s;
        }
        .toggle-wrap input:checked + .toggle-track { background: var(--primary); border-color: var(--primary); }
        .toggle-wrap input:checked + .toggle-track::before { transform: translateX(20px); background: #fff; }

        .btn-royal {
            display: block; width: 100%; margin-top: 15px; border: none; padding: 16px; border-radius: 14px;
            background: var(--primary); color: #111; font-family: 'Outfit', sans-serif;
            font-size: 0.8rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn-royal:hover { background: var(--primary-light); transform: translateY(-2px); }
        .btn-royal:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ═══════════════════════════════════════
           SEARCH & LIST
        ═══════════════════════════════════════ */
        .search-wrap { position: sticky; top: 0; z-index: 90; padding: 10px 0 14px; background: var(--bg-main); }
        .search-inner {
            background: var(--bg-card); border: 1px solid var(--glass-border); border-radius: 14px; padding: 12px 16px;
            display: flex; align-items: center; gap: 10px; margin-bottom: 12px; backdrop-filter: blur(10px);
        }
        .search-inner input { background: none; border: none; outline: none; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.9rem; width: 100%; }
        .search-inner input::placeholder { color: var(--text-muted); }
        .search-icon { color: var(--text-dim); font-size: 0.8rem; }

        .filter-strip { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 14px; scrollbar-width: none; }
        .filter-strip::-webkit-scrollbar { display: none; }
        .filter-pill {
            white-space: nowrap; padding: 6px 14px; border-radius: 16px;
            background: transparent; border: 1px solid var(--glass-border);
            color: var(--text-dim); font-size: 0.75rem; font-weight: 400; cursor: pointer; transition: 0.3s;
        }
        .filter-pill.active { background: var(--primary-dim); border-color: var(--primary-border); color: var(--primary); }

        .list-header { padding-bottom: 12px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .list-title { font-size: 0.65rem; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; font-weight: 500; }
        .btn-export { background: transparent; border: 1px solid var(--glass-border); color: var(--text-dim); padding: 5px 12px; border-radius: 8px; font-size: 0.65rem; cursor: pointer; transition: 0.3s; }
        .btn-export:hover { background: rgba(255,255,255,0.05); color: var(--text); }

        .guest-item {
            padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
            display: flex; justify-content: space-between; align-items: center;
            animation: revealItem 0.4s ease forwards; opacity: 0; transform: translateY(10px);
        }
        @keyframes revealItem { to { opacity: 1; transform: translateY(0); } }
        .guest-item:last-child { border-bottom: none; }
        .guest-name { font-size: 0.95rem; font-weight: 500; color: var(--text); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
        .guest-meta { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { font-size: 0.55rem; font-weight: 500; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase; border: 1px solid var(--glass-border); }
        .tag-viola { color: var(--rose); background: rgba(224, 159, 156, 0.1); } 
        .tag-farhan { color: var(--azure); background: rgba(161, 181, 200, 0.1); }
        .tag-vip { background: var(--primary-dim); color: var(--primary); border-color: var(--primary-border); }
        .tag-cat { color: var(--text-dim); background: rgba(255,255,255,0.02); }

        .btn-delete { background: transparent; border: none; color: var(--text-muted); padding: 8px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .btn-delete:hover { color: #ff5e5e; }

        .empty-state { padding: 40px 20px; text-align: center; display: none; }
        .empty-icon { font-size: 2rem; color: var(--text-muted); margin-bottom: 10px; }
        
        .royal-footer { text-align: center; padding: 20px; font-size: 0.65rem; color: var(--text-muted); letter-spacing: 1px; }

        /* Custom SweetAlert Elegan */
        .swal2-popup { background: rgba(25, 25, 28, 0.95) !important; backdrop-filter: blur(20px) !important; color: var(--text) !important; border: 1px solid var(--glass-border) !important; border-radius: 20px !important; box-shadow: var(--shadow-elegant) !important; }
        .swal2-title { color: var(--primary) !important; font-family: 'Cormorant Garamond', serif !important; font-size: 1.6rem !important; font-style: italic; font-weight: 500 !important;}
        .swal2-html-container { color: var(--text-dim) !important; font-family: 'Outfit', sans-serif !important; font-size: 0.9rem !important;}
        .swal2-confirm { background: var(--primary) !important; color: #111 !important; border-radius: 10px !important; font-family: 'Outfit', sans-serif !important; font-weight: 600 !important; }
        .swal2-cancel { background: transparent !important; color: var(--text-dim) !important; border: 1px solid var(--glass-border) !important; font-family: 'Outfit', sans-serif !important; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3" type="audio/mpeg">
    </audio>

    <div class="theme-switcher-wrap">
        <div class="theme-toggle-btn"><i class="fas fa-palette"></i></div>
        <div class="theme-palette">
            <div class="color-dot" style="background: #d8a4a5;" title="Dusty Rose" onclick="setTheme('rose')"></div>
            <div class="color-dot" style="background: #e3d5ca;" title="Champagne" onclick="setTheme('champagne')"></div>
            <div class="color-dot" style="background: #a3b899;" title="Sage Green" onclick="setTheme('sage')"></div>
            <div class="color-dot" style="background: #9fb3c8;" title="Serenity Blue" onclick="setTheme('dustyblue')"></div>
            <div class="color-dot" style="background: #c0b3c8;" title="Lilac" onclick="setTheme('lilac')"></div>
        </div>
    </div>

    <div id="splashScreen" onclick="openApp()">
        <div class="splash-ornament"><div class="splash-monogram">V&F</div></div>
        <div class="splash-names">Viola & Farhan</div>
        <div class="splash-subtitle">Wedding Guest Management</div>
        <div class="splash-cta"><span>Buka Undangan</span> <i class="fas fa-arrow-right" style="font-size:0.6rem"></i></div>
    </div>

    <div id="particles"></div>

    <div id="musicBtn" onclick="toggleMusic()"><i class="fas fa-music" style="color:var(--text-dim);"></i></div>

    <div class="container">
        <div class="royal-header">
            <div class="header-divider"><span class="header-divider-icon">✦</span><span style="font-size:0.55rem; letter-spacing:4px; color:var(--text-dim);">THE WEDDING</span><span class="header-divider-icon">✦</span></div>
            <h1 class="royal-title">Viola & Farhan</h1>
            <p class="royal-subtitle">Daftar Tamu</p>
            <div id="statusPill" class="status-pill"><span class="status-dot"></span> System Online</div>
        </div>

        <div class="stat-grid">
            <div class="stat-card primary"><span class="stat-label">Total Tamu</span><span class="stat-value" id="countAll">—</span><i class="fas fa-users stat-icon-bg"></i></div>
            <div class="stat-card primary"><span class="stat-label">Tamu VIP</span><span class="stat-value" id="countVip">—</span><i class="fas fa-crown stat-icon-bg"></i></div>
            <div class="stat-card rose"><span class="stat-label">Pihak Viola</span><span class="stat-value" id="countViola">—</span><i class="fas fa-heart stat-icon-bg"></i></div>
            <div class="stat-card azure"><span class="stat-label">Pihak Farhan</span><span class="stat-value" id="countFarhan">—</span><i class="fas fa-ring stat-icon-bg"></i></div>
        </div>

        <div class="luxury-card">
            <div class="card-header">
                <div class="card-title"><i class="fas fa-plus"></i> Tambah Tamu Baru</div>
            </div>
            <form id="guestForm" onsubmit="submitGuest(event)">
                <div class="form-row">
                    <input type="text" id="guestName" class="luxury-input" placeholder="Nama Lengkap Tamu…" required autocomplete="off">
                </div>
                <div class="form-row">
                    <span class="form-label">Keluarga Pihak</span>
                    <select id="guestSide" class="luxury-select">
                        <option value="Viola">Viola (Perempuan)</option>
                        <option value="Farhan">Farhan (Laki-laki)</option>
                    </select>
                </div>
                <div class="form-row">
                    <span class="form-label">Kategori</span>
                    <select id="guestCategory" class="luxury-select">
                        <option>Keluarga Inti</option><option>Kakek / Nenek</option><option>Om / Tante</option><option>Sepupu</option>
                        <option>Teman</option><option>Rekan Kerja</option><option>Tamu Ayah Farhan</option><option>Tamu Ibu Farhan</option>
                        <option>Tamu Ayah Viola</option><option>Tamu Ibu Viola</option><option>Lainnya</option>
                    </select>
                </div>
                <div class="vip-row">
                    <span class="vip-label"><i class="fas fa-crown" style="font-size:0.7rem;"></i> Set VIP</span>
                    <label class="toggle-wrap"><input type="checkbox" id="guestVip"><span class="toggle-track"></span></label>
                </div>
                <button type="submit" class="btn-royal" id="btnSubmit">Simpan Data</button>
            </form>
        </div>

        <div class="search-wrap">
            <div class="search-inner"><i class="fas fa-search search-icon"></i><input type="text" id="searchInput" placeholder="Cari nama atau kategori…" oninput="renderList()"></div>
            <div class="filter-strip">
                <button class="filter-pill active" onclick="setFilter('all',this)">Semua</button>
                <button class="filter-pill" onclick="setFilter('vip',this)">VIP</button>
                <button class="filter-pill" onclick="setFilter('Viola',this)">Viola</button>
                <button class="filter-pill" onclick="setFilter('Farhan',this)">Farhan</button>
                <button class="filter-pill" onclick="setFilter('Keluarga Inti',this)">Keluarga Inti</button>
                <button class="filter-pill" onclick="setFilter('Teman',this)">Teman</button>
            </div>
        </div>

        <div class="luxury-card" style="padding:18px 22px;">
            <div class="list-header">
                <span class="list-title">Daftar (<span id="liveCount">0</span>)</span>
                <button class="btn-export" onclick="exportExcel()"><i class="fas fa-download"></i> Export</button>
            </div>
            <div id="guestList"></div>
            <div id="emptyState" class="empty-state">
                <div class="empty-icon"><i class="fas fa-book-open"></i></div>
                <div style="font-size:0.8rem; color:var(--text-muted)">Belum ada data</div>
            </div>
        </div>

        <div class="royal-footer">Powered by <strong>Ayogi Akbar</strong><br>for <strong>Farhan & Viola</strong></div>
    </div>

    <script>
    // ═══════════════════════════════════════════
    // THEME SYSTEM (PASTEL / WEDDING TONES)
    // ═══════════════════════════════════════════
    const themes = {
        rose: { main: '#d8a4a5', light: '#e6b9ba', dim: 'rgba(216, 164, 165, 0.15)', border: 'rgba(216, 164, 165, 0.4)' },
        champagne: { main: '#e3d5ca', light: '#f5ebe1', dim: 'rgba(227, 213, 202, 0.15)', border: 'rgba(227, 213, 202, 0.4)' },
        sage: { main: '#a3b899', light: '#bdd0b4', dim: 'rgba(163, 184, 153, 0.15)', border: 'rgba(163, 184, 153, 0.4)' },
        dustyblue: { main: '#9fb3c8', light: '#bccce0', dim: 'rgba(159, 179, 200, 0.15)', border: 'rgba(159, 179, 200, 0.4)' },
        lilac: { main: '#c0b3c8', light: '#d5cbe0', dim: 'rgba(192, 179, 200, 0.15)', border: 'rgba(192, 179, 200, 0.4)' }
    };

    let activeThemeHex = '#d8a4a5';

    function setTheme(themeName) {
        const t = themes[themeName]; if(!t) return;
        const root = document.documentElement;
        root.style.setProperty('--primary', t.main); root.style.setProperty('--primary-light', t.light);
        root.style.setProperty('--primary-dim', t.dim); root.style.setProperty('--primary-border', t.border);
        activeThemeHex = t.main;
        localStorage.setItem('weddingTheme', themeName);
    }
    const savedTheme = localStorage.getItem('weddingTheme'); if(savedTheme) setTheme(savedTheme);

    // ═══════════════════════════════════════════
    // SPLASH & MULTI-PARTICLES
    // ═══════════════════════════════════════════
    const audio = document.getElementById('bgMusic'); let isPlaying = false;
    function openApp() {
        const s = document.getElementById('splashScreen'); s.style.opacity = '0'; s.style.transform = 'scale(1.03)';
        setTimeout(() => s.style.display = 'none', 1200);
        audio.volume = 0.3; audio.play().then(() => { isPlaying = true; document.getElementById('musicBtn').classList.add('spinning'); }).catch(()=>{});
        startParticles();
    }
    function toggleMusic() {
        if(isPlaying){ audio.pause(); document.getElementById('musicBtn').classList.remove('spinning'); }
        else{ audio.play(); document.getElementById('musicBtn').classList.add('spinning'); }
        isPlaying = !isPlaying;
    }

    // Partikel Campur (Bunga, Daun, Bintang) & Warna Warni Soft
    function startParticles() {
        const c = document.getElementById('particles');
        const icons = ['fas fa-leaf', 'fas fa-seedling', 'fas fa-star', 'fas fa-spa', 'fas fa-sparkles', 'fab fa-pagelines'];
        const pastelColors = ['#f4cfdf', '#e2f0cb', '#b5ead7', '#c7ceea', '#fff2cc', '#f3d1dc'];
        
        setInterval(() => {
            const el = document.createElement('i');
            const randIcon = icons[Math.floor(Math.random()*icons.length)];
            const randColor = pastelColors[Math.floor(Math.random()*pastelColors.length)];
            
            el.className = randIcon + ' particle';
            el.style.left = Math.random()*100 + 'vw';
            el.style.fontSize = (Math.random()*12+8) + 'px';
            el.style.color = randColor; 
            el.style.animationDuration = (Math.random()*8+7) + 's'; // Jatuh pelan elegan
            
            c.appendChild(el);
            setTimeout(() => el.remove(), 15000);
        }, 800);
    }

    // ═══════════════════════════════════════════
    // SUPABASE LOGIC
    // ═══════════════════════════════════════════
    const apiUrl = 'https://odarliliqtnliiwayyhe.supabase.co/rest/v1/guests';
    const apiKey = 'sb_publishable_UXr26UzpGIVnL-U7QBPdLg_7Oo4cvCU';
    const headers = { 'apikey': apiKey, 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };
    
    let fullData = []; let currentFilter = 'all';

    async function fetchData() {
        try {
            const res = await fetch(apiUrl + '?select=*&order=created_at.desc', { headers });
            if (!res.ok) throw new Error();
            fullData = await res.json() || []; updateStats(); renderList(); setStatus(true);
        } catch { setStatus(false); }
    }

    function setStatus(online) {
        const el = document.getElementById('statusPill');
        if (online) { el.style.color = '#8ce19e'; el.style.background = 'rgba(52,199,89,0.08)'; el.style.borderColor = 'rgba(52,199,89,0.2)'; el.innerHTML = '<span class="status-dot"></span> System Online'; } 
        else { el.style.color = '#ff6b6b'; el.style.background = 'rgba(255,59,48,0.08)'; el.style.borderColor = 'rgba(255,59,48,0.2)'; el.innerHTML = 'Offline'; }
    }

    function updateStats() {
        document.getElementById('countAll').innerText = fullData.length; document.getElementById('countVip').innerText = fullData.filter(g => g.is_vip).length;
        document.getElementById('countViola').innerText = fullData.filter(g => g.side === 'Viola').length; document.getElementById('countFarhan').innerText = fullData.filter(g => g.side === 'Farhan').length;
    }

    function renderList() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        let filtered = fullData.filter(g => (g.name.toLowerCase().includes(search) || g.category.toLowerCase().includes(search)) && (currentFilter === 'all' ? true : currentFilter === 'vip' ? g.is_vip : g.side === currentFilter || g.category === currentFilter));
        document.getElementById('liveCount').innerText = filtered.length;
        const list = document.getElementById('guestList'), empty = document.getElementById('emptyState');
        if (filtered.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        list.innerHTML = filtered.map((g, i) => `
            <div class="guest-item" style="animation-delay:${Math.min(i*0.03, 0.3)}s">
                <div>
                    <div class="guest-name">${g.name} ${g.is_vip ? '<i class="fas fa-crown" style="color:var(--primary); font-size:0.7rem;"></i>' : ''}</div>
                    <div class="guest-meta"><span class="tag tag-${g.side.toLowerCase()}">${g.side}</span><span class="tag tag-cat">${g.category}</span></div>
                </div>
                <button class="btn-delete" onclick="deleteGuest(${g.id}, '${g.name.replace(/'/g,"\\'")}')"><i class="fas fa-times"></i></button>
            </div>
        `).join('');
    }

    function setFilter(filter, btn) { currentFilter = filter; document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active')); btn.classList.add('active'); renderList(); }

    async function submitGuest(e) {
        e.preventDefault(); const btn = document.getElementById('btnSubmit');
        let rawName = document.getElementById('guestName').value.trim();
        let name = rawName.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase());
        
        if (fullData.some(g => g.name.toLowerCase() === name.toLowerCase())) {
            const conf = await Swal.fire({ title: 'Nama Sudah Ada', html: `Tamu <b style="color:var(--primary)">${name}</b> sudah terdaftar. Tetap simpan?`, icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Simpan', cancelButtonText: 'Batal' });
            if (!conf.isConfirmed) return;
        }
        btn.disabled = true; btn.innerText = 'Menyimpan...';
        try {
            await fetch(apiUrl, { method: 'POST', headers, body: JSON.stringify({ name, side: document.getElementById('guestSide').value, category: document.getElementById('guestCategory').value, is_vip: document.getElementById('guestVip').checked }) });
            Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'Tersimpan', showConfirmButton: false, timer: 2000, background: 'rgba(25, 25, 28, 0.95)', color: activeThemeHex });
            e.target.reset(); fetchData();
        } catch { Swal.fire('Error', 'Gagal menyimpan', 'error'); } finally { btn.disabled = false; btn.innerText = 'Simpan Data'; }
    }

    async function deleteGuest(id, name) {
        const conf = await Swal.fire({ title: 'Hapus Tamu', html: `Hapus <b style="color:var(--primary)">${name}</b> dari daftar?`, icon: 'warning', showCancelButton: true, confirmButtonText: 'Hapus', cancelButtonText: 'Batal' });
        if (!conf.isConfirmed) return;
        try { await fetch(apiUrl + '?id=eq.' + id, { method: 'DELETE', headers }); fetchData(); } catch {}
    }

    function exportExcel() {
        if (fullData.length === 0) return Swal.fire({ toast: true, position:'top', title: 'Data Kosong', icon: 'info', showConfirmButton:false, timer:2000, background: 'rgba(25, 25, 28, 0.95)', color: activeThemeHex });
        const ws = XLSX.utils.json_to_sheet(fullData.map((g, i) => ({ 'No': i+1, 'Nama': g.name, 'Pihak': g.side, 'Kategori': g.category, 'VIP': g.is_vip ? 'Ya' : 'Tidak' })));
        XLSX.writeFile(XLSX.utils.book_append_sheet(XLSX.utils.book_new(), ws, 'Undangan'), 'Undangan_ViolaFarhan.xlsx');
    }

    fetchData(); setInterval(fetchData, 5000);
    </script>
</body>
</html>
