<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viola & Farhan - Sistem Inti</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #ccc; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; box-sizing: border-box; font-size: 16px; border-radius: 8px; border: 1px solid #aaa; }
        button { background: #d4af37; color: white; border: none; font-weight: bold; cursor: pointer; }
        /* KOTAK MONITOR DEBUGGING */
        #debugBox { background: black; color: lime; padding: 15px; font-family: monospace; font-size: 13px; border-radius: 5px; margin-bottom: 20px; min-height: 80px; word-wrap: break-word; }
    </style>
</head>
<body>

    <div id="debugBox">STATUS: Memulai sistem...</div>

    <div class="card">
        <h3>Tambah Tamu</h3>
        <input type="text" id="guestName" placeholder="Ketik Nama Tamu di sini...">
        <select id="guestSide">
            <option value="Viola">Pihak Viola</option>
            <option value="Farhan">Pihak Farhan</option>
        </select>
        <select id="guestCategory">
            <option value="Keluarga Inti">Keluarga Inti</option>
            <option value="Teman">Teman</option>
        </select>
        <button onclick="simpanData()" id="btnSimpan">SIMPAN DATA</button>
    </div>

    <div class="card">
        <h3>Daftar Tamu Tersimpan</h3>
        <div id="listTamu">Sedang memuat data dari database...</div>
    </div>

    <script>
        const debugBox = document.getElementById('debugBox');
        function log(msg) {
            debugBox.innerHTML += "<br>> " + msg;
            console.log(msg);
        }

        // Jika tulisan ini tidak muncul, berarti Vercel Anda belum update!
        log("JAVASCRIPT BERHASIL BERJALAN!");

        // Kredensial Supabase Langsung
        const url = "https://odarliliqtnliiwayyhe.supabase.co/rest/v1/guests";
        const key = "sb_publishable_UXr26UzpGIVnL-U7QBPdLg_7Oo4cvCU";

        async function simpanData() {
            const btn = document.getElementById('btnSimpan');
            const name = document.getElementById('guestName').value;
            const side = document.getElementById('guestSide').value;
            const category = document.getElementById('guestCategory').value;

            if(!name) { log("GAGAL: Nama tamu belum diisi!"); return; }

            btn.innerText = "MENYIMPAN...";
            log("Mencoba kirim data: " + name);

            try {
                // JALUR API LANGSUNG (Bypass Library)
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': key,
                        'Authorization': 'Bearer ' + key,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({ name: name, side: side, category: category, is_vip: false })
                });

                const result = await response.json();
                log("Respon Database (Kode): " + response.status);

                if (!response.ok) {
                    log("🔴 DATABASE MENOLAK: " + JSON.stringify(result));
                } else {
                    log("🟢 SUKSES! Data tersimpan di Cloud.");
                    document.getElementById('guestName').value = ""; // Bersihkan kolom
                    muatData(); // Refresh list
                }
            } catch (e) {
                log("🔴 ERROR KRITIS: " + e.message);
            }
            btn.innerText = "SIMPAN DATA";
        }

        async function muatData() {
            log("Menarik data tamu dari Cloud...");
            try {
                const response = await fetch(url + "?select=*", {
                    method: 'GET',
                    headers: { 'apikey': key, 'Authorization': 'Bearer ' + key }
                });
                const data = await response.json();
                
                if(!response.ok) {
                     log("🔴 GAGAL TARIK DATA: " + JSON.stringify(data));
                     return;
                }

                document.getElementById('listTamu').innerHTML = data.map(g => 
                    "<p><b>" + g.name + "</b> - Pihak " + g.side + " (" + g.category + ")</p>"
                ).join('');
                log("Tarik data selesai. Total: " + data.length + " tamu.");
            } catch (e) {
                log("🔴 GAGAL KONEKSI: " + e.message);
            }
        }

        // Panggil fungsi saat web dibuka
        muatData();
    </script>
</body>
</html>
