<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masalah Jaringan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glow {
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.2);
        }
    </style>
</head>
<body class="bg-gray-950 flex items-center justify-center min-h-screen p-4">

    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 max-w-md w-full text-center glow relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-red-500 rounded-full blur-[80px] opacity-30"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-orange-500 rounded-full blur-[80px] opacity-20"></div>

        <div class="flex justify-center mb-6 relative z-10">
            <div class="bg-red-500/10 p-4 rounded-full border border-red-500/20">
                <svg class="w-12 h-12 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-gray-100 mb-2 relative z-10">Koneksi Terputus</h1>
        <p class="text-gray-400 mb-8 relative z-10 text-sm leading-relaxed">
            Web sedang mengalami masalah jaringan. Mohon hubungi developer untuk perbaikan lebih lanjut.
        </p>

        <div class="flex flex-col space-y-3 relative z-10">
            <button onclick="window.location.reload()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-300 ease-in-out transform hover:scale-[1.02] shadow-lg shadow-indigo-500/30">
                Coba Muat Ulang
            </button>
        </div>
    </div>

</body>
</html>
