<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guest Management - Viola & Farhan</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --ios-bg: #f2f2f7; --ios-surface: #ffffff; --ios-text: #000000;
            --ios-text-sec: #8e8e93; --ios-separator: #c6c6c8;
            --wed-gold: #d4af37; --wed-pink: #ff2d55; --wed-blue: #007aff;
            --radius-lg: 20px; --radius-md: 12px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--ios-bg); color: var(--ios-text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 50px; }
        .ios-header { position: sticky; top: 0; z-index: 100; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 0.5px solid var(--ios-separator); padding: 15px; text-align: center; }
        .wed-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--wed-gold); margin: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        .stat-card { background: var(--ios-surface); border-radius: 12px; padding: 15px; text-align: center; border: 0.5px solid var(--ios-separator); margin-bottom: 15px; }
        .ios-card { background: var(--ios-surface); border-radius: var(--radius-lg); margin-bottom: 20px; border: 0.5px solid var(--ios-separator); overflow: hidden; }
        .ios-row { padding: 12px 20px; border-bottom: 0.5px solid var(--ios-separator); display: flex; align-items: center; justify-content: space-between; }
        .ios-input, .ios-select { border: none; background: transparent; font-size: 1rem; width: 100%; outline: none; }
        .ios-select { text-align: right; direction: rtl; color: var(--wed-gold); font-weight: 600; }
        .btn-ios { background: var(--wed-gold); color: #fff; border: none; padding: 16px; width: 100%; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .guest-item { padding: 15px 20px; border-bottom: 0.5px solid var(--ios-separator); display: flex; justify-content: space-between; align-items: center; background: #fff; }
        .badge { padding: 2px 8px; border-radius: 6px; font-weight: 700; font-size: 0.65rem; }
        .side-Viola { background: #ffe4e8; color: var(--wed-pink); }
        .side-Farhan { background: #e0f2fe; color: var(--wed-blue); }
        .switch { position: relative; width: 50px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e5e5ea; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 24px; width: 24px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #34c759; }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <div class="ios-header">
        <div class="wed-title">Viola & Farhan</div>
        <div id="debug-status" style="font-size: 0.6rem; color: #8e8e93;">Menghubungkan ke Database...</div>
    </div>

    <div class="container">
        <div class="ios-card">
            <form id="guestForm">
                <div class="ios-row"><input type="text" id="guestName" class="ios-input" placeholder="Nama Lengkap Tamu..." required></div>
                <div class="ios-row">
                    <span>Pihak</span>
                    <select id="guestSide" class="ios-select">
                        <option value="Viola">Viola</option>
                        <option value="Farhan">Farhan</option>
                    </select>
                </div>
                <div class="ios-row">
                    <span>Kategori</span>
                    <select id="guestCategory" class="ios-select">
                        <option value="Keluarga Inti">Keluarga Inti</option>
                        <option value="Om / Tante">Om / Tante</option>
                        <option value="Sepupu">Sepupu</option>
                        <option value="Teman">Teman</option>
                        <option value="Rekan Kerja">Rekan Kerja</option>
                    </select>
                </div>
                <div class="ios-row">
                    <span>Prioritas VIP <i class="fas fa-crown" style="color:var(--wed-gold)"></i></span>
                    <label class="switch"><input type="checkbox" id="guestVip"><span class="slider"></span></label>
                </div>
                <button type="submit" class="btn-ios" id="btnSubmit">SIMPAN SEKARANG</button>
            </form>
        </div>

        <div class="ios-card" id="guestList">
            <div style="padding: 20px; text-align: center; color: #8e8e93;">Memuat daftar tamu...</div>
        </div>
    </div>

    <script>
        // KREDENSIAL DARI FILE .ENV ANDA
        const supabaseUrl = 'https://hwtqcikabecpwdschviu.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh3dHFjaWthYmVjcHdkc2Nodml1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA0MDExMzYsImV4cCI6MjA3NTk3NzEzNn0.VsefjeWgfmsdcnNAKjypOXlRo6F5MgrQgUt28coW-NE';
        
        // Inisialisasi Klien
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchGuests() {
            const { data, error } = await supabase.from('guests').select('*').order('created_at', { ascending: false });
            
            if (error) {
                document.getElementById('debug-status').innerText = "Gagal Memuat: " + error.message;
                return;
            }

            document.getElementById('debug-status').innerText = "Database Terhubung (" + data.length + " Tamu)";
            const listDiv = document.getElementById('guestList');
            
            if (data.length === 0) {
                listDiv.innerHTML = '<div style="padding:20px; text-align:center;">Belum ada tamu.</div>';
                return;
            }

            listDiv.innerHTML = data.map(g => `
                <div class="guest-item">
                    <div>
                        <div style="font-weight:600;">${g.name} ${g.is_vip ? '👑' : ''}</div>
                        <div style="font-size:0.7rem; color:#8e8e93; margin-top:4px;">
                            <span class="badge side-${g.side}">${g.side}</span> • ${g.category}
                        </div>
                    </div>
                    <button onclick="hapusTamu(${g.id})" style="border:none; background:none; color:#ff3b30;"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        document.getElementById('guestForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "MENYIMPAN...";

            const payload = {
                name: document.getElementById('guestName').value,
                side: document.getElementById('guestSide').value,
                category: document.getElementById('guestCategory').value,
                is_vip: document.getElementById('guestVip').checked
            };

            const { error } = await supabase.from('guests').insert([payload]);

            btn.disabled = false; btn.innerText = "SIMPAN SEKARANG";

            if (error) {
                Swal.fire('Gagal!', error.message, 'error');
            } else {
                Swal.fire({ icon: 'success', title: 'Tersimpan!', showConfirmButton: false, timer: 1000 });
                document.getElementById('guestName').value = '';
                fetchGuests();
            }
        };

        async function hapusTamu(id) {
            if (confirm('Hapus tamu ini?')) {
                await supabase.from('guests').delete().eq('id', id);
                fetchGuests();
            }
        }

        fetchGuests();
    </script>
</body>
</html>
