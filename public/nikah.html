<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Viola & Farhan - Royal Guest Management</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f1d592;
            --gold-dark: #b5952f;
            --dark-bg: #0c0c0e;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --ios-red: #ff3b30;
            --ios-green: #34c759;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #1a1a1d, #0c0c0e);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding-bottom: 50px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- LUXURY SPLASH SCREEN --- */
        #splashScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; cursor: pointer;
            transition: all 1.2s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .splash-envelope {
            width: 120px; height: 120px; background: var(--gold-primary);
            border-radius: 15px; position: relative; margin-bottom: 30px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.4);
            animation: float 3s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .splash-text { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold-primary); text-align: center; }
        .tap-msg { margin-top: 50px; color: rgba(255,255,255,0.5); font-size: 0.8rem; letter-spacing: 4px; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        /* --- PARTICLE SYSTEM --- */
        #particle-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .p-leaf { position: absolute; animation: fall linear infinite; filter: drop-shadow(0 0 2px var(--gold-primary)); opacity: 0.6; }
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); }
        }

        /* --- HEADER & NAVIGATION --- */
        .glass-header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(12, 12, 14, 0.7);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 0; text-align: center;
        }
        .main-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--gold-primary); margin: 0; }

        /* --- CONTENT CARDS --- */
        .container { max-width: 500px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }
        
        .luxury-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 25px; margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-item { padding: 15px; border-radius: 18px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass-border); text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 800; display: block; color: var(--gold-primary); }
        .stat-lbl { font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; }

        /* --- FORM STYLING --- */
        .input-group { margin-bottom: 20px; }
        .input-lbl { display: block; font-size: 0.75rem; font-weight: 700; color: var(--gold-primary); margin-bottom: 8px; text-transform: uppercase; }
        .luxury-input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 12px; color: #fff; font-size: 1rem; outline: none;
            transition: 0.3s;
        }
        .luxury-input:focus { border-color: var(--gold-primary); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        /* --- THE SHIMMER BUTTON --- */
        .btn-shimmer {
            background: linear-gradient(135deg, var(--gold-primary), var(--gold-dark));
            width: 100%; padding: 18px; border: none; border-radius: 15px;
            color: #000; font-weight: 800; font-size: 1rem; cursor: pointer;
            position: relative; overflow: hidden; transition: 0.3s;
        }
        .btn-shimmer::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 2.5s infinite;
        }
        @keyframes shimmer { 100% { left: 150%; } }
        .btn-shimmer:active { transform: scale(0.97); }

        /* --- GUEST LIST ITEM --- */
        .guest-item {
            background: rgba(255,255,255,0.03); border-radius: 16px; padding: 15px;
            margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
            border-left: 3px solid var(--gold-primary); animation: slideIn 0.5s ease-out forwards;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        
        .guest-name { font-weight: 700; font-size: 1rem; margin-bottom: 4px; }
        .guest-meta { font-size: 0.7rem; color: rgba(255,255,255,0.5); font-weight: 600; }
        .vip-tag { color: var(--gold-primary); font-size: 0.65rem; background: rgba(212,175,55,0.1); padding: 2px 8px; border-radius: 4px; margin-left: 5px; border: 1px solid var(--gold-primary); }

        /* --- MUSIC DISC --- */
        .music-disc {
            position: fixed; bottom: 25px; left: 25px; z-index: 1000;
            width: 45px; height: 45px; border-radius: 50%; background: #222;
            border: 2px solid var(--gold-primary); display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer;
        }
        .music-disc.playing { animation: rotate 4s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* --- EXCEL BUTTON --- */
        .btn-excel {
            background: var(--ios-green); color: #fff; padding: 8px 15px;
            border-radius: 10px; border: none; font-size: 0.75rem; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0a13f69d2.mp3" type="audio/mpeg">
    </audio>

    <div id="splashScreen" onclick="startApp()">
        <div class="splash-envelope"><i class="fas fa-heart fa-3x" style="color:#000;"></i></div>
        <div class="splash-text">Viola & Farhan</div>
        <div style="color:var(--gold-primary); font-weight:600; font-size:0.7rem; margin-top:10px; letter-spacing:3px;">SYSTEM BY EXSALA API</div>
        <div class="tap-msg">Klik Untuk Membuka Undangan</div>
    </div>

    <div id="particle-container"></div>

    <div class="music-disc" id="musicToggle" onclick="toggleMusic()">
        <i class="fas fa-music" style="color:var(--gold-primary);"></i>
    </div>

    <div class="glass-header">
        <h1 class="main-title">Viola & Farhan</h1>
        <div style="font-size:0.6rem; letter-spacing:2px; color:rgba(255,255,255,0.4); margin-top:5px;">MANAGEMENT SYSTEM v3.0</div>
    </div>

    <div class="container">
        <div class="stat-grid">
            <div class="stat-item glass">
                <span class="stat-lbl">Tamu Terdaftar</span>
                <span class="stat-val" id="totalTamu">0</span>
            </div>
            <div class="stat-item glass">
                <span class="stat-lbl">Tamu VIP</span>
                <span class="stat-val" id="totalVip">0</span>
            </div>
        </div>

        <div class="luxury-card glass">
            <form id="guestForm">
                <div class="input-group">
                    <label class="input-lbl">Nama Lengkap Tamu</label>
                    <input type="text" id="guestName" class="luxury-input" placeholder="Contoh: Pak De Hendra" required autocomplete="off">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px;">
                    <div class="input-group">
                        <label class="input-lbl">Pihak Keluarga</label>
                        <select id="guestSide" class="luxury-input" style="appearance: none;">
                            <option value="Viola">Viola (Pr)</option>
                            <option value="Farhan">Farhan (Lk)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label class="input-lbl">Kategori</label>
                        <select id="guestCat" class="luxury-input" style="appearance: none;">
                            <option value="Keluarga Inti">Keluarga</option>
                            <option value="Kakek / Nenek">Kakek/Nenek</option>
                            <option value="Rekan Kerja">Rekan</option>
                            <option value="Teman">Teman</option>
                        </select>
                    </div>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; padding: 0 5px;">
                    <span style="font-weight:700; font-size:0.9rem; color:var(--gold-primary);">AKSES VIP ✨</span>
                    <input type="checkbox" id="guestVip" style="width:20px; height:20px; accent-color:var(--gold-primary);">
                </div>
                <button type="submit" class="btn-shimmer" id="btnSubmit">SIMPAN DATA KE CLOUD</button>
            </form>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; padding:0 5px;">
            <div style="font-weight:800; font-size:0.9rem; letter-spacing:1px;">DAFTAR TAMU</div>
            <button class="btn-excel" onclick="exportData()"><i class="fas fa-file-excel"></i> EKSPOR</button>
        </div>

        <div id="guestList"></div>
        <div id="emptyMsg" style="text-align:center; padding:50px; opacity:0.3; display:none;">
            <i class="fas fa-folder-open fa-3x"></i><br>Data Masih Kosong
        </div>
    </div>

    <script>
        // --- 1. SYSTEM INITIALIZATION ---
        const bgMusic = document.getElementById('bgMusic');
        let isMusicPlaying = false;

        function startApp() {
            const splash = document.getElementById('splashScreen');
            splash.style.opacity = '0';
            splash.style.transform = 'scale(1.1)';
            setTimeout(() => {
                splash.style.display = 'none';
                initParticles();
                bgMusic.play();
                isMusicPlaying = true;
                document.getElementById('musicToggle').classList.add('playing');
            }, 1200);
        }

        function toggleMusic() {
            if(isMusicPlaying) { bgMusic.pause(); isMusicPlaying = false; }
            else { bgMusic.play(); isMusicPlaying = true; }
            document.getElementById('musicToggle').classList.toggle('playing');
        }

        function initParticles() {
            const container = document.getElementById('particle-container');
            setInterval(() => {
                const p = document.createElement('i');
                const isSparkle = Math.random() > 0.4;
                p.className = isSparkle ? 'fas fa-sparkles p-leaf' : 'fas fa-leaf p-leaf';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.color = isSparkle ? '#fff' : '#d4af37';
                p.style.fontSize = (Math.random() * 10 + 5) + 'px';
                p.style.animationDuration = (Math.random() * 5 + 5) + 's';
                container.appendChild(p);
                setTimeout(() => p.remove(), 10000);
            }, 800);
        }

        // --- 2. SUPABASE LOGIC (NATIVE FETCH) ---
        const apiUrl = 'https://odarliliqtnliiwayyhe.supabase.co/rest/v1/guests';
        const apiKey = 'sb_publishable_UXr26UzpGIVnL-U7QBPdLg_7Oo4cvCU';
        const headers = { 'apikey': apiKey, 'Authorization': 'Bearer ' + apiKey, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

        let currentData = [];

        async function fetchGuests() {
            try {
                const res = await fetch(apiUrl + '?select=*&order=created_at.desc', { method: 'GET', headers: headers });
                currentData = await res.json() || [];
                renderUI();
            } catch (err) { console.error("Sync Error", err); }
        }

        document.getElementById('guestForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const rawName = document.getElementById('guestName').value.trim();
            const formattedName = rawName.replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());

            btn.disabled = true; btn.innerText = "SINKRONISASI...";

            const payload = {
                name: formattedName,
                side: document.getElementById('guestSide').value,
                category: document.getElementById('guestCat').value,
                is_vip: document.getElementById('guestVip').checked
            };

            try {
                const res = await fetch(apiUrl, { method: 'POST', headers: headers, body: JSON.stringify(payload) });
                if(res.ok) {
                    Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'Tamu Berhasil Disimpan', showConfirmButton: false, timer: 1500 });
                    e.target.reset();
                    fetchGuests();
                }
            } finally { btn.disabled = false; btn.innerText = "SIMPAN DATA KE CLOUD"; }
        };

        function renderUI() {
            const list = document.getElementById('guestList');
            const empty = document.getElementById('emptyMsg');
            
            document.getElementById('totalTamu').innerText = currentData.length;
            document.getElementById('totalVip').innerText = currentData.filter(g => g.is_vip).length;

            if(currentData.length === 0) { empty.style.display = 'block'; list.innerHTML = ''; return; }
            empty.style.display = 'none';

            list.innerHTML = currentData.map((g, i) => `
                <div class="guest-item" style="animation-delay: ${i * 0.1}s">
                    <div>
                        <div class="guest-name">${g.name} ${g.is_vip ? '<span class="vip-tag">VIP</span>' : ''}</div>
                        <div class="guest-meta">${g.side.toUpperCase()} • ${g.category}</div>
                    </div>
                    <button onclick="deleteGuest(${g.id})" style="border:none; background:none; color:var(--ios-red); cursor:pointer;">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');
        }

        async function deleteGuest(id) {
            Swal.fire({
                title: 'Hapus Data?', text: "Data tidak bisa dikembalikan!", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#ff3b30', confirmButtonText: 'Ya, Hapus'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    await fetch(`${apiUrl}?id=eq.${id}`, { method: 'DELETE', headers: headers });
                    fetchGuests();
                }
            });
        }

        function exportData() {
            if (currentData.length === 0) return;
            const ws = XLSX.utils.json_to_sheet(currentData.map(g => ({ 'Nama': g.name, 'Keluarga': g.side, 'Kategori': g.category, 'Status': g.is_vip ? 'VIP' : 'Normal' })));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Tamu");
            XLSX.writeFile(wb, "GuestList_ViolaFarhan.xlsx");
        }

        // Jalankan fetch awal & interval 10 detik
        fetchGuests();
        setInterval(fetchGuests, 10000);
    </script>
</body>
</html>
